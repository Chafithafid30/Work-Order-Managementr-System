server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Always revalidate the SPA shell so a rebuilt container cannot serve an old
  # login bundle from the browser cache.
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
